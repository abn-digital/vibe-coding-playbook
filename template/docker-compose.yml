# Local dev — json-file logging. Connects to hike-agentic-playground GCP (no emulators).
# Prerequisite: gcloud auth application-default login
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8081:8081"
    env_file:
      - compose.env
    environment:
      PORT: "8081"
      GOOGLE_CLOUD_PROJECT: hike-agentic-playground
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ${GCLOUD_ADC_DIR}:/root/.config/gcloud:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    env_file:
      - compose.env
    environment:
      VITE_FIREBASE_PROJECT_ID: hike-agentic-playground
    volumes:
      - ./frontend:/app
      - /app/node_modules
