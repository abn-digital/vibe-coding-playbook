name: verify
on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test
      - name: Firestore rules tests (real project - skips if secret unset)
        run: pnpm --filter backend run test:rules
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Create env files for smoke test
        run: |
          echo "GCLOUD_ADC_DIR=${HOME}/.config/gcloud" > .env
          cat > compose.env <<EOF
          VITE_FIREBASE_API_KEY=smoke-test
          VITE_FIREBASE_AUTH_DOMAIN=hike-agentic-playground.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID=hike-agentic-playground
          EOF
      - run: docker compose up -d backend --build --wait
      - run: curl -sf http://localhost:8081/api/health
